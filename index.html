<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPM Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        
        .theme-transition { transition: background-color 0.4s ease, color 0.4s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Hata Düzeltme: Lucide ikonlarının React reconciliation sürecini bozmasını engellemek için
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);

            return (
                <span ref={iconRef} className="inline-flex items-center justify-center pointer-events-none" style={{ width: size, height: size }}></span>
            );
        };

        const INITIAL_CATEGORIES = [
            { id: 'payment', name: 'Banka/Kredi', icon: 'credit-card' },
            { id: 'transit', name: 'Ulaşım/Metro', icon: 'bus' },
            { id: 'id', name: 'Kimlik/Belge', icon: 'user' },
            { id: 'ticket', name: 'Bilet/Uçuş', icon: 'ticket' },
            { id: 'loyalty', name: 'Kurum/Market', icon: 'coffee' }
        ];

        const CUSTOM_ICONS = ['star', 'heart', 'briefcase', 'gift', 'shopping-cart', 'music', 'camera', 'activity', 'anchor', 'book', 'car', 'dumbbell'];

        const CARD_COLORS = [
            'from-zinc-800 to-black', 'from-slate-600 to-slate-900',
            'from-red-500 to-red-900', 'from-orange-400 to-orange-800',
            'from-amber-400 to-amber-700', 'from-yellow-400 to-yellow-800',
            'from-lime-400 to-lime-800', 'from-green-400 to-emerald-900',
            'from-emerald-400 to-teal-800', 'from-teal-400 to-cyan-900',
            'from-cyan-400 to-blue-800', 'from-sky-400 to-indigo-900',
            'from-blue-500 to-indigo-900', 'from-indigo-500 to-purple-900',
            'from-violet-500 to-fuchsia-900', 'from-purple-500 to-pink-900',
            'from-fuchsia-500 to-rose-900', 'from-pink-500 to-rose-800',
            'from-rose-500 to-red-900',
            'from-indigo-500 via-purple-500 to-pink-500',
            'from-cyan-400 via-blue-500 to-indigo-600'
        ];

        function App() {
            const [cards, setCards] = useState(() => JSON.parse(localStorage.getItem('npm_v4_cards') || '[]'));
            const [appPin, setAppPin] = useState(localStorage.getItem('npm_v4_pin'));
            
            // Ayarlar
            const [groupCats, setGroupCats] = useState(() => localStorage.getItem('npm_v4_group_cats') === 'true');

            // Şifre İpucu Sistemi
            const [appPinHint, setAppPinHint] = useState(() => localStorage.getItem('npm_v4_pin_hint') || '');
            const [pinHintInput, setPinHintInput] = useState('');
            const [showForgotPin, setShowForgotPin] = useState(false);

            const [appTheme, setAppTheme] = useState(() => localStorage.getItem('npm_v4_theme') || 'dark');
            const [savedUserName, setSavedUserName] = useState(() => localStorage.getItem('npm_saved_user_name') || '');
            const [customCategories, setCustomCategories] = useState(() => JSON.parse(localStorage.getItem('npm_v4_cats') || '[]'));
            
            const allCategories = [...INITIAL_CATEGORIES, ...customCategories];
            
            const [activeTab, setActiveTab] = useState('wallet');
            const [isLocked, setIsLocked] = useState(!!appPin);
            const [enteredPin, setEnteredPin] = useState('');
            const [selectedCard, setSelectedCard] = useState(null);
            
            // YENİ: Kart Düzenleme (Edit) State'i
            const [editingCardId, setEditingCardId] = useState(null);

            // UI Modalları
            const [showQrModal, setShowQrModal] = useState(false);
            const [showNfcModal, setShowNfcModal] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
            const [showNfcInfo, setShowNfcInfo] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [alertData, setAlertData] = useState(null);
            const [namePromptCard, setNamePromptCard] = useState(null);
            const [tempNameInput, setTempNameInput] = useState('');

            // Kurumsal Panel State (Artık LocalStorage'a kaydediliyor)
            const [showCorpLogin, setShowCorpLogin] = useState(false);
            const [corpLoginPin, setCorpLoginPin] = useState('');
            const [corpForm, setCorpForm] = useState(() => {
                const saved = localStorage.getItem('npm_v4_corp_form');
                return saved ? JSON.parse(saved) : { categoryId: 'ticket', issuer: '', brandLogo: null, name: '', color: 'from-zinc-800 to-black', detailsPrefix: 'KOD-', customFields: [] };
            });
            const [corpNamesText, setCorpNamesText] = useState(() => localStorage.getItem('npm_v4_corp_names') || '');
            const [bulkAmount, setBulkAmount] = useState(() => localStorage.getItem('npm_v4_corp_bulk') || 1);
            const [corpQRs, setCorpQRs] = useState([]);
            const [generatedCorpCards, setGeneratedCorpCards] = useState([]);
            const corpLogoRef = useRef(null);
            const corpQRsRef = useRef(null);
            const corpImportRef = useRef(null);

            const [newCatName, setNewCatName] = useState('');
            const [newCatIcon, setNewCatIcon] = useState(CUSTOM_ICONS[0]);

            const [pinSetupStep, setPinSetupStep] = useState(0);
            const [tempPin, setTempPin] = useState('');

            // NEW CARD DEFAULT STATE: Kategori verileri (catData) ve Özel Alanlar (customFields)
            const [newCard, setNewCard] = useState({ categoryId: 'payment', issuer: '', name: '', ownerName: '', details: '', color: 'from-zinc-800 to-black', photo: null, brandLogo: null, catData: {}, customFields: [] });
            
            const fileInputRef = useRef(null);
            const importInputRef = useRef(null);

            useEffect(() => { localStorage.setItem('npm_v4_cards', JSON.stringify(cards)); }, [cards]);
            useEffect(() => { if(appPin) localStorage.setItem('npm_v4_pin', appPin); else localStorage.removeItem('npm_v4_pin'); }, [appPin]);
            useEffect(() => { localStorage.setItem('npm_v4_pin_hint', appPinHint); }, [appPinHint]);
            useEffect(() => { localStorage.setItem('npm_v4_theme', appTheme); }, [appTheme]);
            useEffect(() => { localStorage.setItem('npm_saved_user_name', savedUserName); }, [savedUserName]);
            useEffect(() => { localStorage.setItem('npm_v4_cats', JSON.stringify(customCategories)); }, [customCategories]);
            useEffect(() => { localStorage.setItem('npm_v4_group_cats', groupCats); }, [groupCats]);

            // YENİ: Kurumsal Form State'ini Kaydet
            useEffect(() => { localStorage.setItem('npm_v4_corp_form', JSON.stringify(corpForm)); }, [corpForm]);
            useEffect(() => { localStorage.setItem('npm_v4_corp_names', corpNamesText); }, [corpNamesText]);
            useEffect(() => { localStorage.setItem('npm_v4_corp_bulk', bulkAmount); }, [bulkAmount]);

            // --- BİREYSEL KART ÖZEL ALANLARI ---
            const addCustomField = () => {
                if((newCard.customFields || []).length < 5) {
                    setNewCard({ ...newCard, customFields: [...(newCard.customFields || []), { id: Date.now().toString(), label: '', value: '' }] });
                }
            };
            const updateCustomField = (id, field, val) => {
                setNewCard({ ...newCard, customFields: newCard.customFields.map(cf => cf.id === id ? { ...cf, [field]: val } : cf) });
            };
            const removeCustomField = (id) => {
                setNewCard({ ...newCard, customFields: newCard.customFields.filter(cf => cf.id !== id) });
            };

            // --- KURUMSAL ÖZEL ALANLARI ---
            const addCorpCustomField = () => {
                if((corpForm.customFields || []).length < 5) {
                    setCorpForm({ ...corpForm, customFields: [...(corpForm.customFields || []), { id: Date.now().toString(), label: '', value: '' }] });
                }
            };
            const updateCorpCustomField = (id, field, val) => {
                setCorpForm({ ...corpForm, customFields: corpForm.customFields.map(cf => cf.id === id ? { ...cf, [field]: val } : cf) });
            };
            const removeCorpCustomField = (id) => {
                setCorpForm({ ...corpForm, customFields: corpForm.customFields.filter(cf => cf.id !== id) });
            };

            // --- DOSYA İŞLEMLERİ ---
            const exportCard = (card) => {
                try {
                    const jsonStr = JSON.stringify(card);
                    const encodedData = btoa(unescape(encodeURIComponent(jsonStr)));
                    const npm5Content = `NPM5|${encodedData}`;
                    const blob = new Blob([npm5Content], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${card.name.replace(/\s+/g, '_')}.npmwallet`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                } catch (err) { setAlertData({ title: "Hata", message: "Dışa aktarma başarısız." }); }
            };

            const handleImportFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    if (content.startsWith("NPM5|")) {
                        try {
                            const base64Data = content.split('|')[1];
                            const decodedStr = decodeURIComponent(escape(atob(base64Data)));
                            const importedCard = JSON.parse(decodedStr);
                            importedCard.id = Date.now().toString();
                            if (!importedCard.ownerName || importedCard.ownerName.trim() === '') {
                                setNamePromptCard(importedCard);
                                setTempNameInput(savedUserName);
                            } else {
                                finalizeImport(importedCard);
                            }
                        } catch (err) { setAlertData({ title: "Hata", message: "Dosya okunamadı." }); }
                    } else { setAlertData({ title: "Hata", message: "Geçersiz dosya formatı." }); }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            const finalizeImport = (cardToImport) => {
                setCards(prev => [cardToImport, ...prev]);
                setActiveTab('wallet');
                setAlertData({ title: "Başarılı!", message: "Kart cüzdana eklendi." });
                setNamePromptCard(null);
            };

            const handleNamePromptSubmit = (useSaved) => {
                const finalName = useSaved ? savedUserName : tempNameInput.toUpperCase();
                if (!finalName.trim()) return;
                setSavedUserName(finalName);
                finalizeImport({ ...namePromptCard, ownerName: finalName });
            };

            const resizeImage = (file, maxWidth, callback) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width; let h = img.height;
                        if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                        callback(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleImageUpload = (e) => {
                if(e.target.files[0]) resizeImage(e.target.files[0], 600, (base64) => setNewCard({...newCard, photo: base64}));
            };

            // --- KURUMSAL ŞABLON İÇE AKTARMA ---
            const handleCorpImportFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    if (content.startsWith("NPM5|")) {
                        try {
                            const base64Data = content.split('|')[1];
                            const decodedStr = decodeURIComponent(escape(atob(base64Data)));
                            const importedCard = JSON.parse(decodedStr);
                            
                            // Numaradaki son rakamları silip prefix'i (Örn: KOD-) bulmaya çalışıyoruz
                            const extractedPrefix = importedCard.details ? importedCard.details.replace(/[0-9]+$/, '') : 'KOD-';

                            setCorpForm({
                                categoryId: importedCard.categoryId || 'ticket',
                                issuer: importedCard.issuer || '',
                                name: importedCard.name || '',
                                color: importedCard.color || 'from-zinc-800 to-black',
                                brandLogo: importedCard.brandLogo || null,
                                detailsPrefix: extractedPrefix,
                                customFields: importedCard.customFields ? importedCard.customFields.map(cf => ({...cf})) : []
                            });
                            setAlertData({ title: "Şablon Yüklendi!", message: `"${importedCard.name}" şablonu kurumsal panele başarıyla aktarıldı. Şimdi toplu üretim yapabilirsiniz.` });
                        } catch (err) { setAlertData({ title: "Hata", message: "Dosya okunamadı." }); }
                    } else { setAlertData({ title: "Hata", message: "Geçersiz dosya formatı." }); }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            const scanNfcCard = async () => {
                if ('NDEFReader' in window) {
                    try {
                        const ndef = new window.NDEFReader();
                        await ndef.scan();
                        setAlertData({ title: "NFC Aktif", message: "Lütfen fiziksel bir kartı veya bileti telefonun arkasına yaklaştırın." });
                        ndef.addEventListener("reading", ({ serialNumber }) => {
                            if (serialNumber) {
                                const formattedUID = serialNumber.replace(/:/g, '').toUpperCase();
                                setNewCard(prev => ({ ...prev, details: formattedUID }));
                                setAlertData({ title: "Başarılı!", message: `Kart okundu! Çip No: ${formattedUID}` });
                            } else {
                                setAlertData({ title: "Uyarı", message: "Kart algılandı ancak seri numarası okunamadı." });
                            }
                        });
                    } catch (error) {
                        setAlertData({ title: "NFC Hatası", message: "NFC okuyucu başlatılamadı. Tarayıcınızın izinlerini kontrol edin." });
                    }
                } else {
                    setAlertData({ title: "Desteklenmiyor", message: "Web NFC sadece Android cihazlarda (Google Chrome) çalışmaktadır." });
                }
            };

            // --- KURUMSAL ---
            const handleCorpLogUpload = (e) => {
                if(e.target.files[0]) resizeImage(e.target.files[0], 200, (base64) => setCorpForm({...corpForm, brandLogo: base64}));
            };

            const handleCorpQRsUpload = (e) => {
                const files = Array.from(e.target.files).slice(0, 500);
                let processed = 0; const newQRs = [];
                files.forEach(file => {
                    resizeImage(file, 500, (base64) => {
                        newQRs.push(base64); processed++;
                        if (processed === files.length) setCorpQRs(newQRs);
                    });
                });
            };

            const generateBulkCards = () => {
                const namesList = corpNamesText.split('\n').map(n => n.trim()).filter(n => n);
                let requestedCount = parseInt(bulkAmount) || 1;
                const finalCount = Math.min(Math.max(requestedCount, namesList.length, corpQRs.length), 500);
                const generated = [];
                for(let i=0; i<finalCount; i++) {
                    const catIcon = allCategories.find(c => c.id === corpForm.categoryId)?.icon || 'ticket';
                    generated.push({
                        id: 'corp_' + Date.now().toString() + i,
                        categoryId: corpForm.categoryId, issuer: corpForm.issuer, name: corpForm.name,
                        color: corpForm.color, icon: catIcon, brandLogo: corpForm.brandLogo,
                        ownerName: namesList[i] || '', details: corpForm.detailsPrefix + (i+1000).toString(),
                        photo: corpQRs[i] || null, catData: {}, 
                        customFields: corpForm.customFields ? corpForm.customFields.map(cf => ({...cf})) : []
                    });
                }
                setGeneratedCorpCards(generated);
            };

            const addCustomCategory = () => {
                if(!newCatName.trim()) return;
                setCustomCategories([...customCategories, { id: 'custom_' + Date.now(), name: newCatName, icon: newCatIcon }]);
                setNewCatName('');
                setAlertData({title:"Başarılı", message:"Yeni kategori eklendi!"});
            };

            const getThemeClasses = () => {
                switch(appTheme) {
                    case 'light': return { bg: 'bg-slate-50', text: 'text-slate-900', card: 'bg-white border-slate-200 shadow-xl', input: 'bg-slate-100 border-slate-300 text-slate-900', nav: 'bg-white/90 border-slate-200' };
                    case 'neon': return { bg: 'bg-zinc-950', text: 'text-cyan-400', card: 'bg-black border-cyan-900 shadow-[0_0_15px_rgba(34,211,238,0.1)]', input: 'bg-black border-cyan-900 text-cyan-400 focus:border-cyan-400', nav: 'bg-black/90 border-cyan-900/50' };
                    case 'dark': default: return { bg: 'bg-zinc-950', text: 'text-white', card: 'bg-zinc-900 border-zinc-800', input: 'bg-zinc-900 border-zinc-800 text-white focus:border-white', nav: 'bg-zinc-950/95 border-white/5' };
                }
            };
            const t = getThemeClasses();

            const renderCardUI = (card, i) => (
                <div key={card.id} onClick={() => setSelectedCard(card)} className={`absolute left-0 w-full h-52 rounded-[28px] p-6 shadow-[0_-8px_25px_rgba(0,0,0,0.5)] bg-gradient-to-br ${card.color} border-t border-white/20 transition-transform active:scale-95 cursor-pointer text-white`} style={{ top: `${i * 65}px`, zIndex: i }}>
                    <div className="absolute inset-0 bg-black/10 pointer-events-none rounded-[28px]"></div>
                    <div className="flex justify-between items-start relative z-10">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-black/20 rounded-xl flex items-center justify-center shadow-inner backdrop-blur-sm">
                                {card.brandLogo ? <img src={card.brandLogo} className="w-8 h-8 object-contain" /> : <Icon name={card.icon || 'credit-card'} size={24} className="text-white drop-shadow-md" />}
                            </div>
                            <div className="flex flex-col">
                                <h3 className="text-xl font-bold tracking-tight leading-none text-white drop-shadow-md">{card.name}</h3>
                                <p className="text-xs font-medium opacity-90 mt-1 text-white drop-shadow-md">{card.issuer}</p>
                            </div>
                        </div>
                    </div>
                    <div className="mt-auto pt-12 flex justify-between items-end relative z-10">
                        <div>
                            <p className="text-[10px] font-bold uppercase opacity-80 mb-1 tracking-widest text-white drop-shadow-md">{card.ownerName || "KAYITLI BİLGİ"}</p>
                            <p className="font-mono text-xl tracking-wider font-semibold text-white drop-shadow-md">{card.details}</p>
                        </div>
                        {card.photo && <Icon name="image" size={16} className="opacity-60 mb-1 text-white drop-shadow-md" />}
                    </div>
                </div>
            );

            return (
                <div className={`max-w-md mx-auto h-screen ${t.bg} ${t.text} relative flex flex-col overflow-hidden shadow-2xl theme-transition`}>
                    
                    {isLocked ? (
                        <div className="h-full flex flex-col items-center justify-center px-10 relative z-50 animate-in fade-in">
                            <Icon name="lock" size={48} className="mb-8 opacity-50" />
                            <h2 className="text-2xl font-black mb-10 tracking-tight">Kilitli Cüzdan</h2>
                            <div className="flex gap-4 mb-12">
                                {[0, 1, 2, 3].map(i => <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all duration-300 ${enteredPin.length > i ? (appTheme === 'light' ? 'bg-slate-900 border-slate-900 scale-125' : 'bg-white border-white scale-125') : 'border-current opacity-30'}`} />)}
                            </div>
                            <div className="grid grid-cols-3 gap-6 w-full max-w-[280px] mb-10">
                                {[1, 2, 3, 4, 5, 6, 7, 8, 9, 'Sil', 0, 'X'].map(val => (
                                    <button key={val} onClick={() => {
                                        if (val === 'Sil') setEnteredPin(enteredPin.slice(0, -1));
                                        else if (val === 'X') setEnteredPin('');
                                        else {
                                            const updated = enteredPin + val; setEnteredPin(updated);
                                            if(updated.length === 4) {
                                                if(updated === appPin) { setIsLocked(false); setEnteredPin(''); } 
                                                else { setTimeout(() => setEnteredPin(''), 300); }
                                            }
                                        }
                                    }} className={`w-full aspect-square rounded-full flex items-center justify-center text-xl font-bold active:scale-90 transition ${typeof val === 'number' ? t.card : 'opacity-50 text-sm uppercase'}`}>
                                        {val === 'X' ? <Icon name="x" size={20}/> : val}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setShowForgotPin(true)} className="text-xs font-bold opacity-50 underline">Şifremi Unuttum</button>

                            {showForgotPin && (
                                <div className="absolute inset-0 z-[130] bg-black/95 flex items-center justify-center p-8 animate-in fade-in">
                                    <div className={`${t.card} border-2 border-red-500/30 p-8 rounded-[32px] w-full max-w-sm text-center`}>
                                        <h3 className="text-xl font-black mb-4">Kurtarma</h3>
                                        {appPinHint && <div className="bg-white/5 p-4 rounded-2xl mb-6 text-sm"><b>İpucu:</b> {appPinHint}</div>}
                                        <p className="opacity-60 text-xs mb-8">Şifreyi hatırlayamıyorsanız tüm verileri silerek cüzdanı sıfırlayabilirsiniz.</p>
                                        <div className="flex flex-col gap-3">
                                            <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="w-full bg-red-600 text-white font-bold py-4 rounded-xl">CÜZDANI SIFIRLA</button>
                                            <button onClick={() => setShowForgotPin(false)} className={`w-full py-4 rounded-xl font-bold border ${t.input}`}>İPTAL</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    ) : (
                        <>
                            <main className="flex-1 overflow-y-auto px-6 pb-24 pt-12 no-scrollbar">
                                {activeTab === 'wallet' && (
                                    <>
                                        <div className="flex justify-between items-center mb-10">
                                            <h1 className="text-4xl font-black tracking-tighter">Cüzdanım</h1>
                                            <button onClick={() => { setEditingCardId(null); setNewCard({ categoryId: 'payment', issuer: '', name: '', ownerName: '', details: '', color: 'from-zinc-800 to-black', photo: null, catData: {}, customFields: [] }); setActiveTab('add'); }} className={`w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition ${appTheme === 'light' ? 'bg-slate-900 text-white' : (appTheme === 'neon' ? 'bg-cyan-500 text-black shadow-[0_0_15px_rgba(34,211,238,0.6)]' : 'bg-white text-black')}`}><Icon name="plus" /></button>
                                        </div>
                                        
                                        {groupCats ? (
                                            <div className="space-y-10 pb-8">
                                                {allCategories.map(cat => {
                                                    const catCards = [...cards].filter(c => c.categoryId === cat.id).reverse();
                                                    if (catCards.length === 0) return null;
                                                    return (
                                                        <div key={cat.id}>
                                                            <div className="flex items-center gap-2 mb-4 ml-2">

                                            <h2 className="text-2xl font-black mb-2 uppercase">{pinSetupStep === 1 ? 'Şifre Belirle' : 'Doğrula'}</h2>
                                            <div className="flex gap-4 mb-12 mt-10">
                                                {[0, 1, 2, 3].map(i => <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all ${enteredPin.length > i ? 'bg-white border-white scale-125' : 'border-current opacity-30'}`} />)}
                                            </div>
                                            <div className="grid grid-cols-3 gap-6 w-full max-w-[280px]">
                                                {[1, 2, 3, 4, 5, 6, 7, 8, 9, 'Sil', 0, 'X'].map(val => (
                                                    <button key={val} onClick={() => {
                                                        if (val === 'Sil') setEnteredPin(enteredPin.slice(0, -1));
                                                        else if (val === 'X') setEnteredPin('');
                                                        else {
                                                            const updated = enteredPin + val; setEnteredPin(updated);
                                                            if(updated.length === 4) {
                                                                if (pinSetupStep === 1) { setTempPin(updated); setEnteredPin(''); setPinSetupStep(2); } 
                                                                else if (pinSetupStep === 2) { 
                                                                    if (updated === tempPin) { setPinSetupStep(3); setEnteredPin(''); } 
                                                                    else { setAlertData({title:"Hata", message:"Şifreler uyuşmuyor!"}); setPinSetupStep(1); setEnteredPin(''); }
                                                                }
                                                            }
                                                        }
                                                    }} className={`w-full aspect-square rounded-full flex items-center justify-center text-xl font-bold active:scale-90 transition ${typeof val === 'number' ? t.card : 'opacity-50 text-sm uppercase'}`}>{val}</button>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}

                            {showResetConfirm && (
                                <div className="absolute inset-0 z-[150] bg-black/90 flex items-center justify-center p-8 animate-in fade-in">
                                    <div className={`${t.card} border-2 border-red-500/50 p-8 rounded-3xl w-full max-w-sm text-center`}>
                                        <h3 className="text-xl font-bold mb-2 uppercase">Emin Misin?</h3>
                                        <p className="opacity-60 text-sm mb-8">Tüm verileriniz silinecektir.</p>
                                        <div className="flex gap-3">
                                            <button onClick={() => { setCards([]); setShowResetConfirm(false); }} className="flex-1 bg-red-600 text-white font-bold py-4 rounded-xl">SİL</button>
                                            <button onClick={() => setShowResetConfirm(false)} className={`flex-1 font-bold py-4 rounded-xl border ${t.input}`}>VAZGEÇ</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {selectedCard && (
                                <div className={`absolute inset-0 z-50 ${t.bg} flex flex-col p-6 pt-12 animate-in slide-in-from-bottom duration-300 overflow-y-auto no-scrollbar`}>
                                    <div className="flex justify-between items-center mb-8">
                                        <button onClick={() => { setSelectedCard(null); setShowDeleteConfirm(false); }} className="opacity-60 flex items-center gap-2 font-bold"><Icon name="chevron-left" /> GERİ</button>
                                        <button onClick={() => exportCard(selectedCard)} className={`px-4 py-2 rounded-xl flex items-center gap-2 border transition ${t.card} shadow-lg`} title="NPM5 Formatında Dışa Aktar">
                                            <span className="text-[10px] font-black uppercase tracking-widest">DIŞA AKTAR</span>
                                            <Icon name="upload" size={16} />
                                        </button>
                                    </div>
                                    <div className={`h-56 shrink-0 rounded-[32px] p-8 shadow-2xl bg-gradient-to-br ${selectedCard.color} text-white mb-8 border border-white/20 relative flex flex-col`}>
                                        <div className="flex justify-between items-start">
                                            <div className="flex items-center gap-4">
                                                <div className="w-14 h-14 bg-black/20 rounded-2xl flex items-center justify-center shadow-inner backdrop-blur-sm">
                                                    {selectedCard.brandLogo ? <img src={selectedCard.brandLogo} className="w-10 h-10 object-contain" /> : <Icon name={selectedCard.icon || 'credit-card'} size={32} className="text-white drop-shadow-md" />}
                                                </div>
                                                <div className="flex flex-col">
                                                    <h3 className="text-2xl font-bold tracking-tight leading-none text-white drop-shadow-md">{selectedCard.name}</h3>
                                                    <p className="text-sm font-medium opacity-90 mt-1 text-white drop-shadow-md">{selectedCard.issuer}</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mt-auto pt-8 flex justify-between items-end">
                                            <div>
                                                <p className="text-[10px] font-bold uppercase opacity-80 mb-1 tracking-widest text-white drop-shadow-md">{selectedCard.ownerName || "KAYITLI BİLGİ"}</p>
                                                <p className="font-mono text-2xl tracking-wider font-semibold text-white drop-shadow-md">{selectedCard.details}</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* KATEGORİ DETAYLARI VE ÖZEL ALANLAR */}
                                    {((selectedCard.catData && Object.values(selectedCard.catData).some(v => v)) || (selectedCard.customFields && selectedCard.customFields.length > 0)) && (
                                        <div className={`${t.card} border p-5 rounded-[24px] mb-8 space-y-3`}>
                                            {selectedCard.catData?.exp && <div className="flex justify-between items-center border-b border-gray-500/20 pb-2"><span className="text-[10px] font-bold uppercase opacity-50">SKT</span><span className="text-sm font-bold">{selectedCard.catData.exp}</span></div>}
                                            {selectedCard.catData?.cvv && <div className="flex justify-between items-center border-b border-gray-500/20 pb-2"><span className="text-[10px] font-bold uppercase opacity-50">CVV</span><span className="text-sm font-bold">{selectedCard.catData.cvv}</span></div>}
                                            {selectedCard.catData?.dob && <div className="flex justify-between items-center border-b border-gray-500/20 pb-2"><span className="text-[10px] font-bold uppercase opacity-50">Doğum Tarihi</span><span className="text-sm font-bold">{selectedCard.catData.dob}</span></div>}
                                            {selectedCard.catData?.mother && <div className="flex justify-between items-center border-b border-gray-500/20 pb-2"><span className="text-[10px] font-bold uppercase opacity-50">Anne Adı</span><span className="text-sm font-bold">{selectedCard.catData.mother}</span></div>}
                                            {selectedCard.catData?.father && <div className="flex justify-between items-center border-b border-gray-500/20 pb-2"><span className="text-[10px] font-bold uppercase opacity-50">Baba Adı</span><span className="text-sm font-bold">{selectedCard.catData.father}</span></div>}
                                            {selectedCard.catData?.date && <div className="flex justify-between items-center border-b border-gray-500/20 pb-2"><span className="text-[10px] font-bold uppercase opacity-50">Tarih / Saat</span><span className="text-sm font-bold">{selectedCard.catData.date}</span></div>}
                                            {selectedCard.catData?.seat && <div className="flex justify-between items-center border-b border-gray-500/20 pb-2"><span className="text-[10px] font-bold uppercase opacity-50">Koltuk / Sefer</span><span className="text-sm font-bold">{selectedCard.catData.seat}</span></div>}
                                            {selectedCard.catData?.type && <div className="flex justify-between items-center border-b border-gray-500/20 pb-2"><span className="text-[10px] font-bold uppercase opacity-50">Kart Tipi</span><span className="text-sm font-bold">{selectedCard.catData.type}</span></div>}
                                            
                                            {selectedCard.customFields?.filter(cf => cf.label || cf.value).map(cf => (
                                                <div key={cf.id} className="flex justify-between items-center border-b border-gray-500/20 pb-2 last:border-0 last:pb-0">
                                                    <span className="text-[10px] font-bold uppercase opacity-50">{cf.label || 'BİLGİ'}</span>
                                                    <span className="text-sm font-bold text-right">{cf.value}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {selectedCard.photo ? (
                                        <div className={`${t.card} border p-4 rounded-[32px] flex flex-col items-center mb-8`}>
                                            <img src={selectedCard.photo} className="w-full object-contain rounded-2xl" />
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-4 mb-10 shrink-0">
                                            <button onClick={() => setShowNfcModal(true)} className={`${t.card} p-8 rounded-[32px] border flex flex-col items-center gap-3 active:scale-95 transition`}><Icon name="nfc" className="text-blue-500" /><span className="text-[10px] font-black uppercase">NFC</span></button>
                                            <button onClick={() => setShowQrModal(true)} className={`${t.card} p-8 rounded-[32px] border flex flex-col items-center gap-3 active:scale-95 transition`}><Icon name="qr-code" className="text-emerald-500" /><span className="text-[10px] font-black uppercase">QR</span></button>
                                        </div>
                                    )}
                                    
                                    {!showDeleteConfirm ? (
                                        <div className="flex flex-col gap-2 mt-auto pb-10">
                                            <button onClick={() => {
                                                setEditingCardId(selectedCard.id);
                                                setNewCard(selectedCard);
                                                setSelectedCard(null);
                                                setActiveTab('add');
                                            }} className="text-blue-500 font-black text-[10px] uppercase text-center w-full bg-blue-500/10 py-4 rounded-xl active:scale-95 transition">KART BİLGİLERİNİ DÜZENLE</button>
                                            
                                            <button onClick={() => setShowDeleteConfirm(true)} className="text-red-500 font-black text-[10px] uppercase text-center w-full py-4 active:scale-95 transition">KARTI SİL</button>
                                        </div>
                                    ) : (
                                        <div className="mt-auto pb-6">
                                            <div className={`${t.card} border-red-500/50 p-5 rounded-[24px] flex flex-col gap-4 animate-in zoom-in-95 border-2`}>
                                                <p className="text-center font-bold text-sm text-white">Emin misiniz?</p>
                                                <div className="flex gap-3">
                                                    <button onClick={() => { setCards(cards.filter(c => c.id !== selectedCard.id)); setSelectedCard(null); setShowDeleteConfirm(false); }} className="flex-1 bg-red-600 text-white py-4 rounded-xl font-bold text-xs uppercase active:scale-95">SİL</button>
                                                    <button onClick={() => setShowDeleteConfirm(false)} className={`flex-1 py-4 rounded-xl font-bold text-xs uppercase border ${t.input}`}>İPTAL</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {showQrModal && (
                                <div className={`absolute inset-0 z-[60] bg-black/90 backdrop-blur flex flex-col items-center justify-center p-10 animate-in zoom-in-95`}>
                                    <button onClick={() => setShowQrModal(false)} className="absolute top-12 right-10 text-white"><Icon name="x" size={32}/></button>
                                    <div className="bg-white p-10 rounded-[40px] flex flex-col items-center shadow-2xl">
                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(selectedCard.details)}`} className="w-56 h-56 mb-8" />
                                        <img src={`https://barcode.tec-it.com/barcode.ashx?data=${encodeURIComponent(selectedCard.details)}&code=Code128`} className="w-64 h-20 object-contain" />
                                    </div>
                                    <p className="mt-12 font-mono text-white tracking-[0.5em] font-bold">{selectedCard.details}</p>
                                </div>
                            )}

                            {showNfcModal && (
                                <div className="absolute inset-0 z-[60] bg-black/95 backdrop-blur-xl flex flex-col items-center justify-center animate-in fade-in">
                                    <button onClick={() => setShowNfcModal(false)} className="absolute top-12 right-10 text-white opacity-50 hover:opacity-100"><Icon name="x" size={32}/></button>
                                    <div className={`w-32 h-32 rounded-full flex items-center justify-center mb-8 relative ${appTheme === 'neon' ? 'bg-cyan-900/30' : 'bg-blue-600/20'}`}>
                                        <Icon name="nfc" size={64} className={`${appTheme === 'neon' ? 'text-cyan-400' : 'text-blue-500'}`} />
                                    </div>
                                    <h2 className="text-2xl font-black mb-2 text-white uppercase">NFC</h2>
                                    <p className="text-zinc-400 text-center px-12 text-sm">Telefonunuzu yaklaştırın.</p>
                                </div>
                            )}

                            {alertData && (
                                <div className="absolute inset-0 z-[160] bg-black/80 flex items-center justify-center p-8 animate-in fade-in">
                                    <div className={`${t.card} border-2 p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl`}>
                                        <h3 className="text-xl font-bold mb-2 uppercase">{alertData.title}</h3>
                                        <p className="opacity-60 text-sm mb-8">{alertData.message}</p>
                                        <button onClick={() => setAlertData(null)} className={`w-full py-4 rounded-xl active:scale-95 transition font-bold uppercase ${appTheme === 'light' ? 'bg-slate-900 text-white' : 'bg-white text-black'}`}>Tamam</button>
                                    </div>
                                </div>
                            )}

                            {namePromptCard && (
                                <div className="absolute inset-0 z-[170] bg-black/90 backdrop-blur-xl flex flex-col items-center justify-center p-8 animate-in slide-in-from-bottom">
                                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[32px] w-full max-w-sm text-center shadow-2xl relative overflow-hidden text-white">
                                        <h3 className="text-xl font-black mb-2 uppercase">İsim Girin</h3>
                                        <p className="text-zinc-400 text-xs mb-8">Cüzdanınıza kaydetmek için isminizi belirtin.</p>
                                        {savedUserName && (
                                            <div className="bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-4 text-left">
                                                <p className="text-[10px] text-zinc-500 font-bold uppercase mb-1">Kayıtlı Profil</p>
                                                <p className="text-white font-black">{savedUserName}</p>
                                                <button onClick={() => handleNamePromptSubmit(true)} className="w-full mt-3 bg-blue-600 text-white font-bold py-2 rounded-xl text-xs uppercase">KULLAN</button>
                                            </div>
                                        )}
                                        <input placeholder="İSMİNİZ" className="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white outline-none focus:border-white text-sm font-bold uppercase text-center mb-6" value={tempNameInput} onChange={e => setTempNameInput(e.target.value)} />
                                        <div className="flex gap-2">
                                            <button onClick={() => handleNamePromptSubmit(false)} className="flex-1 bg-white text-black font-black py-4 rounded-2xl active:scale-95 transition text-sm">TAMAM</button>
                                            <button onClick={() => setNamePromptCard(null)} className="px-5 bg-zinc-800 text-zinc-400 font-bold py-4 rounded-2xl text-xs">İPTAL</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab !== 'corporate' && (
                                <nav className={`absolute bottom-0 w-full backdrop-blur-xl border-t flex justify-around py-5 pb-9 px-8 z-40 transition-colors ${t.nav}`}>
                                    {[{id:'wallet',i:'wallet',l:'CÜZDAN'},{id:'add',i:'plus',l:'EKLE'},{id:'settings',i:'settings',l:'AYARLAR'}].map(tab => (
                                        <button key={tab.id} onClick={() => {setActiveTab(tab.id); setPinSetupStep(0);}} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === tab.id && pinSetupStep === 0 ? (appTheme === 'neon' ? 'text-cyan-400 scale-110 drop-shadow-[0_0_8px_rgba(34,211,238,0.5)]' : (appTheme === 'light' ? 'text-slate-900 scale-110' : 'text-white scale-110')) : 'opacity-40 hover:opacity-80'}`}>
                                            <Icon name={tab.i} size={22} /><span className="text-[8px] font-black tracking-widest">{tab.l}</span>
                                        </button>
                                    ))}
                                </nav>
                            )}
                        </>
                    )}

                    {showCorpLogin && (
                        <div className="absolute inset-0 z-[180] bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-8 animate-in fade-in">
                            <div className="bg-zinc-900 border border-blue-500/30 p-8 rounded-3xl w-full max-w-sm text-center shadow-[0_0_30px_rgba(59,130,246,0.2)] text-white">
                                <Icon name="building-2" size={48} className="text-blue-500 mx-auto mb-4" />
                                <h3 className="text-xl font-black mb-2 uppercase">Kurumsal Panel</h3>
                                <p className="text-zinc-400 text-xs mb-4">Yetkili şifresini girin.</p>
                                <input type="password" placeholder="Şifre" className="w-full bg-black border border-zinc-800 p-4 rounded-xl text-center text-white font-mono tracking-widest outline-none focus:border-blue-500 mb-6" value={corpLoginPin} onChange={e => setCorpLoginPin(e.target.value)} />
                                <div className="flex gap-3">
                                    <button onClick={() => { if (corpLoginPin === 'NPM5') { setShowCorpLogin(false); setActiveTab('corporate'); setCorpLoginPin(''); } else { setAlertData({title: "Hata", message: "Şifre yanlış."}); setCorpLoginPin(''); } }} className="flex-1 bg-blue-600 text-white font-bold py-4 rounded-xl active:scale-95 transition">GİRİŞ</button>
                                    <button onClick={() => setShowCorpLogin(false)} className="px-6 bg-zinc-800 text-white font-bold py-4 rounded-xl active:scale-95 transition">İPTAL</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
